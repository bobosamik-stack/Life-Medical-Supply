<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07040f;color:white;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
body{background:radial-gradient(circle at 8% 5%,rgba(255,212,71,.18),transparent 24%),radial-gradient(circle at 92% 9%,rgba(255,77,184,.20),transparent 28%),linear-gradient(160deg,#05040c,#180a2d 45%,#07040f)}
.wrap{position:fixed;inset:0;display:grid;place-items:center}.phone{position:relative;width:100vw;height:100dvh;max-width:560px;overflow:hidden;background:#130821;isolation:isolate}
.cinema{position:absolute;inset:0;overflow:hidden;background:radial-gradient(circle at 50% 0%,rgba(255,212,71,.18),transparent 38%),linear-gradient(180deg,#32114f 0%,#180925 58%,#0b0412 100%)}
.spot{position:absolute;left:50%;top:-15%;width:95%;height:80%;transform:translateX(-50%);background:radial-gradient(ellipse at center,rgba(255,255,255,.16),rgba(255,212,71,.06) 38%,transparent 67%);filter:blur(1px);opacity:.9;animation:spot 9s ease-in-out infinite alternate}
.curtain{position:absolute;top:0;bottom:0;width:26%;background:repeating-linear-gradient(90deg,#6b0b3f 0,#9e145c 14px,#4b0730 28px);box-shadow:inset 0 0 45px rgba(0,0,0,.45);z-index:1;opacity:.9}.left{left:-10%;border-radius:0 0 50% 0}.right{right:-10%;border-radius:0 0 0 50%}
.city{position:absolute;left:0;right:0;bottom:35%;height:23%;opacity:.55;background:linear-gradient(to top,rgba(0,0,0,.55),transparent 75%),repeating-linear-gradient(90deg,transparent 0 17px,rgba(255,255,255,.08) 17px 20px,transparent 20px 32px);clip-path:polygon(0 100%,0 42%,7% 42%,7% 25%,14% 25%,14% 55%,20% 55%,20% 31%,27% 31%,27% 48%,33% 48%,33% 20%,40% 20%,40% 52%,48% 52%,48% 29%,55% 29%,55% 60%,64% 60%,64% 34%,71% 34%,71% 50%,79% 50%,79% 24%,87% 24%,87% 47%,94% 47%,94% 37%,100% 37%,100% 100%)}
.floor{position:absolute;left:-12%;right:-12%;bottom:-8%;height:46%;background:radial-gradient(ellipse at center top,rgba(255,255,255,.28),transparent 28%),linear-gradient(180deg,#ffbd56,#ff8a00 54%,#ad3500);border-radius:52% 52% 0 0;box-shadow:0 -20px 80px rgba(255,138,0,.32)}.floor:before{content:"";position:absolute;left:6%;right:6%;top:20px;height:46%;background:repeating-linear-gradient(90deg,rgba(255,255,255,.20) 0 18px,transparent 18px 48px);transform:perspective(420px) rotateX(55deg);border-radius:50%;opacity:.42}

.top{position:absolute;top:calc(env(safe-area-inset-top) + 12px);left:14px;right:14px;z-index:20;display:flex;justify-content:space-between;gap:10px}.badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(13px);border-radius:999px;padding:9px 12px;font-weight:950;font-size:13px;box-shadow:0 12px 35px rgba(0,0,0,.22)}
.title{position:absolute;top:calc(env(safe-area-inset-top) + 62px);left:16px;right:16px;z-index:18;text-align:center;font-size:34px;line-height:.95;font-weight:1000;letter-spacing:-.07em;text-shadow:0 12px 32px rgba(0,0,0,.45)}.title span{background:linear-gradient(135deg,#fff,#ffd447,#ff4db8);-webkit-background-clip:text;background-clip:text;color:transparent}
.subtitle{position:absolute;top:calc(env(safe-area-inset-top) + 132px);left:22px;right:22px;z-index:18;text-align:center;color:rgba(255,255,255,.76);font-size:13px;font-weight:800;line-height:1.35}
.actor{position:absolute;width:122px;height:122px;border-radius:50%;z-index:7;filter:drop-shadow(0 22px 24px rgba(0,0,0,.38));transform-origin:50% 100%}.actor img{width:100%;height:100%;display:block}.actor .torso{position:absolute;left:50%;top:94px;width:86px;height:120px;transform:translateX(-50%);border-radius:30px 30px 24px 24px;z-index:-1;box-shadow:inset 0 0 25px rgba(255,255,255,.14)}.man .torso{background:linear-gradient(135deg,#16233d,#0b63ce)}.woman .torso{background:linear-gradient(135deg,#ff4db8,#ff8a00)}
.leg{position:absolute;top:195px;width:18px;height:52px;border-radius:999px;background:#f8f1ff;z-index:-2;transform-origin:top}.leg.l{left:42px}.leg.r{right:42px}.arm{position:absolute;top:114px;width:19px;height:64px;border-radius:999px;background:#ffd8b8;z-index:-1;transform-origin:top center}.arm.l{left:9px}.arm.r{right:9px}.shadow{position:absolute;left:50%;top:244px;width:128px;height:24px;transform:translateX(-50%);border-radius:50%;background:rgba(0,0,0,.26);filter:blur(4px);z-index:-3}
.man{left:-150px;bottom:31%;animation:manPro 8.4s cubic-bezier(.2,.8,.2,1) forwards paused}.woman{right:38px;bottom:31%;transform:scaleX(-1);animation:womanPro 8.4s ease-in-out forwards paused}.walk .leg.l{animation:walkLeg .38s infinite alternate}.walk .leg.r{animation:walkLeg .38s infinite alternate-reverse}.walk .arm.l{animation:walkArm .45s infinite alternate}.walk .arm.r{animation:walkArm .45s infinite alternate-reverse}
.pie{position:absolute;right:-14px;top:140px;z-index:10;font-size:54px;filter:drop-shadow(0 12px 16px rgba(0,0,0,.35));transform-origin:12px 12px;animation:piePro 8.4s ease-in-out forwards paused}.woman .arm.r{animation:womanArmPro 8.4s ease-in-out forwards paused}
.speech{position:absolute;z-index:12;max-width:260px;padding:13px 15px;border-radius:20px;background:#fff;color:#321045;font-weight:950;line-height:1.18;opacity:0;transform:scale(.75);box-shadow:0 18px 38px rgba(0,0,0,.28)}.speech:after{content:"";position:absolute;bottom:-10px;left:28px;border:11px solid transparent;border-top-color:#fff}.s1{left:18px;bottom:58%;animation:speech1 8.4s forwards paused}.s2{right:18px;bottom:59%;animation:speech2 8.4s forwards paused}.s3{left:50%;bottom:62%;transform:translateX(-50%) scale(.75);text-align:center;animation:speech3 8.4s forwards paused}
.boom{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%) scale(0) rotate(-8deg);z-index:14;font-size:72px;font-weight:1000;letter-spacing:-.08em;color:#ffd447;text-shadow:0 8px 0 #8a2700,0 20px 40px rgba(0,0,0,.45);animation:boomPro 8.4s ease-in-out forwards paused}.stars{position:absolute;left:36%;bottom:57%;z-index:15;opacity:0;animation:starsPro 8.4s forwards paused}.star{position:absolute;font-size:34px;filter:drop-shadow(0 10px 12px rgba(0,0,0,.35));animation:spin 1.1s linear infinite}.star:nth-child(1){left:-54px;top:0}.star:nth-child(2){left:0;top:-48px;animation-delay:.13s}.star:nth-child(3){left:55px;top:0;animation-delay:.26s}
.flash{position:absolute;inset:0;background:#fff;opacity:0;z-index:16;pointer-events:none;animation:flashPro 8.4s forwards paused}.confetti{position:absolute;inset:0;overflow:hidden;z-index:11;pointer-events:none}.c{position:absolute;width:9px;height:17px;border-radius:5px;opacity:0;animation:confettiPro 8.4s forwards paused}

.playing .man,.playing .woman,.playing .pie,.playing .woman .arm.r,.playing .speech,.playing .boom,.playing .stars,.playing .flash,.playing .c{animation-play-state:running}
@keyframes spot{from{transform:translateX(-53%) rotate(-2deg)}to{transform:translateX(-47%) rotate(2deg)}}@keyframes walkLeg{from{transform:rotate(18deg)}to{transform:rotate(-18deg)}}@keyframes walkArm{from{transform:rotate(24deg)}to{transform:rotate(-24deg)}}

@keyframes womanPro{0%,38%{right:38px;bottom:31%;transform:scaleX(-1) rotate(0)}48%{right:38px;bottom:31%;transform:scaleX(-1) rotate(-6deg)}55%{right:42px;bottom:31%;transform:scaleX(-1) rotate(13deg)}60%{right:44px;bottom:31%;transform:scaleX(-1) rotate(-15deg)}72%,100%{right:38px;bottom:31%;transform:scaleX(-1) rotate(0)}}
@keyframes womanArmPro{0%,45%{transform:rotate(-18deg)}52%{transform:rotate(105deg)}58%{transform:rotate(-132deg)}66%,100%{transform:rotate(-18deg)}}@keyframes piePro{0%,45%{transform:translate(0,0) rotate(0deg) scale(1)}52%{transform:translate(-52px,-10px) rotate(125deg) scale(1.24)}58%{transform:translate(-206px,-2px) rotate(420deg) scale(1.32)}68%{transform:translate(-80px,7px) rotate(500deg) scale(1)}100%{transform:translate(-32px,4px) rotate(520deg) scale(1)}}
@keyframes speech1{0%,8%{opacity:0;transform:scale(.72)}13%,31%{opacity:1;transform:scale(1)}38%,100%{opacity:0;transform:scale(.72)}}@keyframes speech2{0%,36%{opacity:0;transform:scale(.72)}42%,51%{opacity:1;transform:scale(1)}56%,100%{opacity:0;transform:scale(.72)}}@keyframes speech3{0%,62%{opacity:0;transform:translateX(-50%) scale(.72)}67%,86%{opacity:1;transform:translateX(-50%) scale(1)}95%,100%{opacity:0;transform:translateX(-50%) scale(.72)}}
@keyframes boomPro{0%,56%{transform:translate(-50%,-50%) scale(0) rotate(-8deg);opacity:0}59%{transform:translate(-50%,-50%) scale(1.25) rotate(3deg);opacity:1}68%{transform:translate(-50%,-50%) scale(.98) rotate(-2deg);opacity:1}84%,100%{transform:translate(-50%,-50%) scale(.65) rotate(-8deg);opacity:0}}@keyframes starsPro{0%,58%{opacity:0;transform:scale(.3) rotate(0deg)}64%,82%{opacity:1;transform:scale(1) rotate(12deg)}93%,100%{opacity:0;transform:scale(.3) rotate(0deg)}}@keyframes flashPro{0%,56%{opacity:0}58%{opacity:.75}61%,100%{opacity:0}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes confettiPro{0%,56%{opacity:0;transform:translateY(-40px) rotate(0)}60%{opacity:1}100%{opacity:0;transform:translateY(520px) rotate(780deg)}}
